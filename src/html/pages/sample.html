<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="샘플 서브 페이지" />
  <title>Static Publishing | Sample</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <!-- Header -->
  <header class="site-header">
    <div class="site-header__inner">
      <a href="../index.html" class="site-header__logo">Static<span class="text-gray-800">Pub</span></a>
      <nav class="site-header__nav">
        <a href="../index.html" class="hover:text-primary transition-colors">Home</a>
        <a href="./sample.html" class="hover:text-primary transition-colors">Sample</a>
      </nav>
    </div>

  <main class="max-w-3xl mx-auto px-6 py-20">

      <span class="mx-2">/</span>
      <span class="text-gray-800">Sample</span>

    <p class="text-gray-600 mb-8">

    </p>

    <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-100 mb-8">
      <h2 class="font-semibold text-lg mb-3">버튼 컴포넌트</h2>
      <div class="flex flex-wrap gap-3">
        <button type="button" class="btn btn--primary">Primary</button>

    <a href="../index.html" class="btn btn--outline">← 홈으로 돌아가기</a>

  <footer class="border-t border-gray-200 mt-10">
    <div class="max-w-3xl mx-auto px-6 py-8 text-center text-sm text-gray-500">
      &copy; <span data-current-year>2026</span> Static Publishing.
